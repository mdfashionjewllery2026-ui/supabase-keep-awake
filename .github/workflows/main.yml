name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase Project 1
        run: |
          curl -X GET "${{ secrets.SUPABASE_1_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_1_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_1_ANON_KEY }}"

      - name: Ping Supabase Project 2
        run: |
          curl -X GET "${{ secrets.SUPABASE_2_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_2_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_2_ANON_KEY }}"

      - name: Ping Supabase Project 3
        run: |
          curl -X GET "${{ secrets.SUPABASE_3_URL }}/rest/v1/products?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_3_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_3_ANON_KEY }}"
